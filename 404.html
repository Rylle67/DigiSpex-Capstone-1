<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Digispex</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0a0f1c">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1c;
      --surface: #111827;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --accent: #2563eb;
      --border: #1e293b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 8rem;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #3b82f6, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--text2);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      max-width: 400px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
    }
    .logo {
      position: absolute;
      top: 2rem;
      left: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
    }
    .logo img { width: 32px; height: 32px; }
    .logo span {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <a class="logo" href="index.html">
    <img src="assets/logo.png" alt="Digispex">
    <span>Digispex</span>
  </a>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a class="back-btn" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
    </svg>
    Back to Shop
  </a>
</body>
</html>
